<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiktoria Wierciszewska — Architektura</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #b8d4e3;
    --blue2:  #d6e9f3;
    --blue3:  #e8f4fa;
    --dark:   #1c2b33;
    --mid:    #4a6370;
    --light:  #f7fbfd;
    --line:   rgba(28,43,51,0.10);
  }

  html, body {
    height: 100%;
    background: var(--light);
    font-family: 'Jost', sans-serif;
    color: var(--dark);
    overflow-x: hidden;
  }

  /* Background grid lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Vertical accent line (like portfolio cover) */
  body::after {
    content: '';
    position: fixed;
    top: 0; right: 120px;
    width: 1px;
    height: 100vh;
    background: var(--line);
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  /* Horizontal accent line */
  .h-line {
    width: 1px;
    height: 60px;
    background: var(--blue);
    margin-bottom: 36px;
    animation: growLine 0.8s ease forwards;
    transform-origin: top;
  }
  @keyframes growLine {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }

  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: var(--blue2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--mid);
    letter-spacing: 2px;
    margin-bottom: 24px;
    border: 1px solid var(--blue);
    opacity: 0;
    animation: fadeUp 0.6s 0.2s ease forwards;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 300;
    letter-spacing: 0.12em;
    text-align: center;
    color: var(--dark);
    opacity: 0;
    animation: fadeUp 0.6s 0.35s ease forwards;
  }

  .title {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 200;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--mid);
    margin-top: 8px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s 0.45s ease forwards;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--blue);
    margin: 32px auto;
    opacity: 0;
    animation: fadeUp 0.6s 0.55s ease forwards;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 380px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    background: white;
    border: 1px solid var(--blue);
    text-decoration: none;
    color: var(--dark);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    opacity: 0;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--blue3);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: 0;
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:hover { border-color: var(--blue); }
  .btn:hover .arrow { transform: translateX(4px); }

  .btn > * { position: relative; z-index: 1; }

  .btn-icon {
    width: 32px;
    height: 32px;
    background: var(--blue2);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg { width: 14px; height: 14px; fill: none; stroke: var(--mid); stroke-width: 1.5; }

  .btn-label { flex: 1; }

  .arrow {
    font-size: 14px;
    color: var(--blue);
    transition: transform 0.3s ease;
  }

  .btn:nth-child(1) { animation: fadeUp 0.5s 0.6s ease forwards; }
  .btn:nth-child(2) { animation: fadeUp 0.5s 0.75s ease forwards; }

  .footer {
    margin-top: 48px;
    font-size: 10px;
    font-weight: 200;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--blue);
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.5s 0.9s ease forwards;
  }

  /* Corner marks (like architectural drawings) */
  .corner {
    position: fixed;
    width: 20px;
    height: 20px;
    opacity: 0.25;
  }
  .corner--tl { top: 24px; left: 24px; border-top: 1px solid var(--dark); border-left: 1px solid var(--dark); }
  .corner--tr { top: 24px; right: 24px; border-top: 1px solid var(--dark); border-right: 1px solid var(--dark); }
  .corner--bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--dark); border-left: 1px solid var(--dark); }
  .corner--br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--dark); border-right: 1px solid var(--dark); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .corner--tr, .corner--br { right: 16px; }
    .corner--tl, .corner--bl { left: 16px; }
    body::after { right: 60px; }
  }
</style>
</head>
<body>

<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<div class="wrap">
  <div class="h-line"></div>

  <div class="avatar">WW</div>

  <h1 class="name">Wiktoria Wierciszewska</h1>
  <p class="title">Architektura &nbsp;·&nbsp; 2024 / 2025</p>

  <div class="divider"></div>

  <div class="links">

    <a class="btn" href="https://drive.google.com/file/d/1Bd_aKCCkTELiaKuGTAQoV6_W8wdmQCdM/view?usp=sharing" target="_blank">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span class="btn-label">Portfolio</span>
      <span class="arrow">→</span>
    </a>

    <a class="btn" href="mailto:wiktoria.wierciszewska@gmail.com">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </span>
      <span class="btn-label">Kontakt</span>
      <span class="arrow">→</span>
    </a>

  </div>

  <p class="footer">Politechnika Białostocka &nbsp;·&nbsp; Białystok</p>
</div>

</body>
</html>
